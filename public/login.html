<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynkFiscal — Login</title>
  <meta name="description" content="Acesse o SynkFiscal — Sistema de Gestão Fiscal">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --card: rgba(16, 24, 48, 0.85);
      --border: rgba(99, 102, 241, 0.25);
      --text: #e2e8f0;
      --text-muted: #64748b;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --error: #ef4444;
      --input-bg: rgba(255,255,255,0.04);
      --input-border: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(130px);
      opacity: 0.12;
      animation: float 9s ease-in-out infinite;
    }
    .bg-blob-1 { width: 700px; height: 700px; background: #6366f1; top: -250px; left: -250px; animation-delay: 0s; }
    .bg-blob-2 { width: 500px; height: 500px; background: #8b5cf6; bottom: -150px; right: -150px; animation-delay: -3s; }
    .bg-blob-3 { width: 350px; height: 350px; background: #06b6d4; top: 35%; left: 55%; animation-delay: -5.5s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -25px) scale(1.04); }
      66%  { transform: translate(-20px, 20px) scale(0.96); }
    }

    /* Grid lines */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.035) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none;
    }

    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    /* Brand */
    .login-brand {
      text-align: center;
      margin-bottom: 32px;
      animation: slideDown 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .brand-icon-wrap {
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 12px 40px rgba(99,102,241,0.45);
    }
    .brand-icon-wrap .material-icons-round { font-size: 34px; color: #fff; }
    .login-brand h1 { font-size: 30px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
    .login-brand h1 span { color: var(--primary); }
    .login-brand p   { font-size: 14px; color: var(--text-muted); margin-top: 5px; }

    /* Card */
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 38px 36px 32px;
      backdrop-filter: blur(24px);
      box-shadow: 0 28px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04);
      animation: slideUp 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideDown { from { opacity:0; transform: translateY(-18px); } to { opacity:1; transform:none; } }
    @keyframes slideUp   { from { opacity:0; transform: translateY(18px);  } to { opacity:1; transform:none; } }

    .login-card h2   { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .login-card > p  { font-size: 13px; color: var(--text-muted); margin-bottom: 28px; }

    .form-group       { margin-bottom: 18px; }
    .form-group label { display:block; font-size:13px; font-weight:500; color:var(--text); margin-bottom:7px; }

    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    .input-icon .material-icons-round { font-size: 18px; }

    input.field {
      width: 100%;
      padding: 12px 44px;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input.field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
      background: rgba(99,102,241,0.04);
    }
    input.field::placeholder { color: var(--text-muted); }

    .toggle-pass {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; padding: 4px; border-radius: 6px;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: var(--text); }

    /* Error alert */
    .alert-error {
      display: none; gap: 8px; align-items: center;
      padding: 11px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      color: #f87171; font-size: 13px;
      margin-bottom: 20px;
      animation: shake 0.4s ease-out;
    }
    .alert-error.show { display: flex; }
    @keyframes shake {
      0%,100% { transform:translateX(0); }
      20%      { transform:translateX(-6px); }
      40%      { transform:translateX(6px); }
      60%      { transform:translateX(-4px); }
      80%      { transform:translateX(4px); }
    }

    /* Button */
    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; margin-top: 6px;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover:not(:disabled) {
      opacity: 0.9; transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(99,102,241,0.45);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.55; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    .loading .btn-text { display: none; }
    .loading .spinner  { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: var(--text-muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,0.07);
    }

    /* Footer */
    .login-footer {
      text-align: center; margin-top: 22px;
      font-size: 12px; color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <div class="login-wrapper">
    <div class="login-brand">
      <div class="brand-icon-wrap">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 10 L18 4 L30 10 L30 20 C30 26 24 31 18 33 C12 31 6 26 6 20 Z" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
          <path d="M12 18 L16 22 L24 14" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18 8 L18 4 M18 4 L22 6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Synk<span>Fiscal</span></h1>
      <p>Sistema de Gestão Fiscal Inteligente</p>
    </div>

    <div class="login-card">
      <h2>Bem-vindo de volta 👋</h2>
      <p>Entre com suas credenciais para continuar</p>

      <div class="alert-error" id="alertError">
        <span class="material-icons-round" style="font-size:16px">error_outline</span>
        <span id="alertMsg">Credenciais inválidas.</span>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
        <div class="form-group">
          <label for="inputEmail">E-mail</label>
          <div class="input-wrap">
            <span class="input-icon"><span class="material-icons-round">mail_outline</span></span>
            <input type="email" id="inputEmail" class="field" placeholder="seu@email.com" autocomplete="email" required>
          </div>
        </div>

        <div class="form-group">
          <label for="inputSenha">Senha</label>
          <div class="input-wrap">
            <span class="input-icon"><span class="material-icons-round">lock_outline</span></span>
            <input type="password" id="inputSenha" class="field" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="toggle-pass" id="toggleBtn" onclick="toggleSenha()">
              <span class="material-icons-round" id="toggleIcon" style="font-size:18px">visibility_off</span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">Entrar no Sistema</span>
          <div class="spinner"></div>
        </button>
      </form>
    </div>

    <div class="login-footer">
      SynkFiscal &copy; 2026 — Gestão Fiscal Automatizada
    </div>
  </div>

  <script>
    // Verifica se já está autenticado
    (async function checkAuth() {
      try {
        const r = await fetch('/api/auth/me', { credentials: 'include' });
        if (r.ok) window.location.replace('/');
      } catch (_) {}
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const btn   = document.getElementById('btnLogin');
      const alert = document.getElementById('alertError');
      const msg   = document.getElementById('alertMsg');

      btn.classList.add('loading');
      btn.disabled = true;
      alert.classList.remove('show');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            email: document.getElementById('inputEmail').value.trim(),
            senha: document.getElementById('inputSenha').value
          })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          localStorage.setItem('synkfiscal_token', data.token);
          localStorage.setItem('synkfiscal_user', JSON.stringify(data.usuario));
          window.location.replace('/');
        } else {
          msg.textContent = data.error || 'Credenciais inválidas.';
          alert.classList.add('show');
        }
      } catch (err) {
        msg.textContent = 'Erro de conexão. Verifique se o servidor está rodando.';
        alert.classList.add('show');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function toggleSenha() {
      const input = document.getElementById('inputSenha');
      const icon  = document.getElementById('toggleIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility_off';
      }
    }

    document.getElementById('inputEmail').focus();
  </script>
</body>
</html>
